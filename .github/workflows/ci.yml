name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run backend tests
        run: mvn -B test --file BE/pom.xml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: FE/package-lock.json
      - name: Install dependencies
        run: npm --prefix FE ci
      - name: Lint
        run: npm --prefix FE run lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'
      - name: Build frontend
        run: npm --prefix FE run build

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: flask-server/requirements.txt
      - name: Install dependencies
        run: pip install -r flask-server/requirements.txt
      - name: Run ML tests
        run: pytest flask-server/tests/

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ml]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t alfri-frontend:ci -f FE/Dockerfile FE/

      - name: Health-check frontend container
        run: |
          docker run -d --name fe-check -p 8090:80 \
            -e BACKEND_URL=http://127.0.0.1:8080 \
            alfri-frontend:ci
          for i in $(seq 1 15); do
            if curl -sf --max-time 5 http://localhost:8090/health; then
              echo "Frontend healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Frontend did not become healthy"; docker logs fe-check; exit 1
            fi
            sleep 1
          done
          docker rm -f fe-check

      - name: Build ML service image
        run: docker build -t alfri-ml-service:ci -f Dockerfile.python .

      - name: Health-check ML service container
        run: |
          docker run -d --name ml-check \
            -e MODE=dev \
            -e LOAD_MODELS_ON_STARTUP=false \
            -e REGISTER_DB_SHUTDOWN_HANDLER=false \
            -p 8091:5000 alfri-ml-service:ci
          sleep 10
          curl -sf --max-time 10 http://localhost:8091/health/live
          docker rm -f ml-check

      - name: Build backend image
        run: docker build -t alfri-backend:ci -f Dockerfile.backend .

      - name: Build Keycloak image
        run: docker build -t alfri-keycloak:ci -f docker/keycloak/Dockerfile.azure-dev .
