name: Release to Azure

# Prerequisites (one-time setup before first run):
#   Run infra/scripts/setup-wif.sh to create the Azure AD app with federated
#   credentials, then add these three secrets to the GitHub repository:
#     AZURE_CLIENT_ID       – App registration clientId from setup-wif.sh output
#     AZURE_TENANT_ID       – Azure AD tenant ID from setup-wif.sh output
#     AZURE_SUBSCRIPTION_ID – Subscription ID from setup-wif.sh output
#
# Also required before first deploy:
#   infra/scripts/provision-secrets.sh  – sets real Key Vault secret values
#   infra/scripts/init-keycloak-db.sh   – creates the keycloak PostgreSQL role

on:
  push:
    branches: [master]

permissions:
  id-token: write   # required for OIDC workload identity federation
  contents: read

env:
  REGISTRY: alfriregistry.azurecr.io
  RESOURCE_GROUP: alfri-rg

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────────

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - run: mvn -B test --file BE/pom.xml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: FE/package-lock.json
      - run: npm --prefix FE ci
      - run: npm --prefix FE run build

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: flask-server/requirements.txt
      - run: pip install -r flask-server/requirements.txt
      - run: pytest flask-server/tests/

  # ── Build, smoke-check locally, push to ACR ────────────────────────────────────

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ml]
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (workload identity federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name alfriregistry

      - name: Build frontend and smoke-check
        run: |
          docker build -t $REGISTRY/alfri-frontend:${{ github.sha }} -f FE/Dockerfile FE/
          docker run -d --name fe-smoke -p 8090:80 \
            -e BACKEND_URL=http://127.0.0.1:8080 \
            $REGISTRY/alfri-frontend:${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -sf --max-time 5 http://localhost:8090/health; then
              echo "Frontend healthy after ${i}s"; break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Frontend did not become healthy"; docker logs fe-smoke; exit 1
            fi
            sleep 1
          done
          docker rm -f fe-smoke

      - name: Build ML service and smoke-check
        run: |
          docker build -t $REGISTRY/alfri-ml-service:${{ github.sha }} -f Dockerfile.python .
          docker run -d --name ml-smoke \
            -e MODE=dev \
            -e LOAD_MODELS_ON_STARTUP=false \
            -e REGISTER_DB_SHUTDOWN_HANDLER=false \
            -p 8091:5000 $REGISTRY/alfri-ml-service:${{ github.sha }}
          sleep 10
          curl -sf --max-time 10 http://localhost:8091/health/live
          docker rm -f ml-smoke

      - name: Build backend image
        run: docker build -t $REGISTRY/alfri-backend:${{ github.sha }} -f Dockerfile.backend .

      - name: Build Keycloak image
        run: docker build -t $REGISTRY/alfri-keycloak:${{ github.sha }} -f docker/keycloak/Dockerfile.azure-dev .

      - name: Push all images to ACR (parallel)
        run: |
          docker push $REGISTRY/alfri-frontend:${{ github.sha }} &
          docker push $REGISTRY/alfri-ml-service:${{ github.sha }} &
          docker push $REGISTRY/alfri-backend:${{ github.sha }} &
          docker push $REGISTRY/alfri-keycloak:${{ github.sha }} &
          wait

  # ── Infrastructure provision ───────────────────────────────────────────────────

  provision:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if preview
        run: |
          az deployment group what-if \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --mode Incremental

      - name: Provision infrastructure
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --mode Incremental \
            --name alfri-infra-${{ github.sha }}

  # ── Ordered image deployment with readiness verification ──────────────────────
  # Deploy order: ML → Keycloak → Backend → Frontend
  # Each step temporarily sets minReplicas=1 to force a cold start so the
  # readiness probe is exercised before proceeding; resets to 0 on success.
  # On failure the prior revision remains active (Container Apps does not
  # auto-promote a failed revision).

  deploy:
    runs-on: ubuntu-latest
    needs: [provision, build-and-push]
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 1. ML service ──────────────────────────────────────────────────────────
      - name: Deploy ML service
        run: |
          az containerapp update \
            --name alfri-ml-service --resource-group $RESOURCE_GROUP \
            --image $REGISTRY/alfri-ml-service:${{ github.sha }} \
            --min-replicas 1 --output none

          LATEST=$(az containerapp show -n alfri-ml-service -g $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "Waiting for revision: $LATEST"
          for i in $(seq 1 18); do
            READY=$(az containerapp show -n alfri-ml-service -g $RESOURCE_GROUP \
              --query "properties.latestReadyRevisionName" -o tsv)
            [ "$LATEST" = "$READY" ] && { echo "ML service ready."; break; }
            [ "$i" -eq 18 ] && { echo "ERROR: ML service timed out after 3 minutes."; exit 1; }
            echo "  $i/18 ready=${READY:-none}"; sleep 10
          done
          az containerapp update -n alfri-ml-service -g $RESOURCE_GROUP \
            --min-replicas 0 --output none

      # ── 2. Keycloak ────────────────────────────────────────────────────────────
      - name: Deploy Keycloak
        run: |
          az containerapp update \
            --name alfri-keycloak --resource-group $RESOURCE_GROUP \
            --image $REGISTRY/alfri-keycloak:${{ github.sha }} \
            --min-replicas 1 --output none

          LATEST=$(az containerapp show -n alfri-keycloak -g $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "Waiting for revision: $LATEST"
          # Keycloak JVM + DB migration: allow up to 5 minutes (30 × 10 s)
          for i in $(seq 1 30); do
            READY=$(az containerapp show -n alfri-keycloak -g $RESOURCE_GROUP \
              --query "properties.latestReadyRevisionName" -o tsv)
            [ "$LATEST" = "$READY" ] && { echo "Keycloak ready."; break; }
            [ "$i" -eq 30 ] && { echo "ERROR: Keycloak timed out after 5 minutes."; exit 1; }
            echo "  $i/30 ready=${READY:-none}"; sleep 10
          done

          KC_FQDN=$(az containerapp show -n alfri-keycloak -g $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Smoke-testing OIDC discovery at $KC_FQDN..."
          curl -sf --max-time 30 --retry 5 --retry-delay 10 \
            "https://${KC_FQDN}/realms/alfri/.well-known/openid-configuration" > /dev/null
          echo "Keycloak OIDC discovery OK."
          az containerapp update -n alfri-keycloak -g $RESOURCE_GROUP \
            --min-replicas 0 --output none

      # ── 3. Backend ─────────────────────────────────────────────────────────────
      - name: Deploy backend
        run: |
          az containerapp update \
            --name alfri-backend --resource-group $RESOURCE_GROUP \
            --image $REGISTRY/alfri-backend:${{ github.sha }} \
            --min-replicas 1 --output none

          LATEST=$(az containerapp show -n alfri-backend -g $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "Waiting for revision: $LATEST"
          for i in $(seq 1 18); do
            READY=$(az containerapp show -n alfri-backend -g $RESOURCE_GROUP \
              --query "properties.latestReadyRevisionName" -o tsv)
            [ "$LATEST" = "$READY" ] && { echo "Backend ready."; break; }
            [ "$i" -eq 18 ] && { echo "ERROR: Backend timed out after 3 minutes."; exit 1; }
            echo "  $i/18 ready=${READY:-none}"; sleep 10
          done
          az containerapp update -n alfri-backend -g $RESOURCE_GROUP \
            --min-replicas 0 --output none

      # ── 4. Frontend ────────────────────────────────────────────────────────────
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name alfri-frontend --resource-group $RESOURCE_GROUP \
            --image $REGISTRY/alfri-frontend:${{ github.sha }} \
            --min-replicas 1 --output none

          LATEST=$(az containerapp show -n alfri-frontend -g $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "Waiting for revision: $LATEST"
          for i in $(seq 1 18); do
            READY=$(az containerapp show -n alfri-frontend -g $RESOURCE_GROUP \
              --query "properties.latestReadyRevisionName" -o tsv)
            [ "$LATEST" = "$READY" ] && { echo "Frontend ready."; break; }
            [ "$i" -eq 18 ] && { echo "ERROR: Frontend timed out after 3 minutes."; exit 1; }
            echo "  $i/18 ready=${READY:-none}"; sleep 10
          done

          FE_FQDN=$(az containerapp show -n alfri-frontend -g $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Smoke-testing frontend at $FE_FQDN..."
          curl -sf --max-time 30 --retry 5 --retry-delay 10 \
            "https://${FE_FQDN}/health" > /dev/null
          echo "Frontend health OK."
          az containerapp update -n alfri-frontend -g $RESOURCE_GROUP \
            --min-replicas 0 --output none

      # ── Summary ────────────────────────────────────────────────────────────────
      - name: Log deployed revisions
        if: always()
        run: |
          echo "=== Deployed revisions (SHA: ${{ github.sha }}) ==="
          for app in alfri-ml-service alfri-keycloak alfri-backend alfri-frontend; do
            REV=$(az containerapp show -n $app -g $RESOURCE_GROUP \
              --query "properties.latestReadyRevisionName" -o tsv 2>/dev/null || echo "N/A")
            echo "  $app → $REV"
          done
