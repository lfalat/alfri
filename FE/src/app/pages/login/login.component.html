<div class="login-container container">
  <div class="login-wrapper">
    <div class="row mat-elevation-z4">
      <!-- Left Panel - Info Section -->
      <div class="info-panel col-12 col-md-6">
        <div class="pattern-grid"></div>
        <div class="blob blob-top"></div>
        <div class="blob blob-bottom"></div>
        <div class="info-content">
          <div class="brain-image-wrapper">
            <img
              ngSrc="assets/images/brain_lb.png"
              alt="ALFRI Brain"
              class="brain-image"
              height="1012"
              width="1408"
              priority
            />
          </div>
          <h2 class="info-title">Prvý inteligentný asistent pre študentov a učiteľov FRI UNIZA.</h2>
        </div>
      </div>

      <!-- Right Panel - Form Section -->
      <div class="form-panel col-12 col-md-6">
        <div class="form-content">
          <div class="form-header">
            <h1 class="form-title">Prihlásenie</h1>
            <p class="form-subtitle">Zadajte svoje prihlasovacie údaje pre prístup.</p>
          </div>

          <form (ngSubmit)="onSubmit()" class="login-form">
            <button mat-raised-button color="primary" class="submit-button" type="submit">
              Prihlásiť sa
            </button>
          </form>

          <div class="divider">
            <span>Alebo</span>
          </div>

          <div class="auth-prompt">
            <p>
              Nemáte účet?
              <a class="auth-link" href="javascript:void(0)" (click)="redirectToRegistration()">
                Registrujte sa
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
