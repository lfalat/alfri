<div class="registration-container container">
  <div class="registration-wrapper">
    <!-- Left Panel - Info Section -->
    <div class="row mat-elevation-z4">
      <div class="info-panel col-12 col-md-6">
        <div class="pattern-grid"></div>
        <div class="blob blob-top"></div>
        <div class="blob blob-bottom"></div>
        <div class="info-content">
          <div class="brain-image-wrapper">
            <img
              ngSrc="assets/images/brain_lb.png"
              alt="ALFRI Brain"
              class="brain-image img-fluid"
              height="1012"
              width="1408"
              priority
            />
          </div>
          <h2 class="info-title">Prvý inteligentný asistent pre študentov a učiteľov FRI UNIZA.</h2>
        </div>
      </div>

      <!-- Right Panel - Form Section -->
      <div class="form-panel col-12 col-md-6">
        <div class="form-content">
          <div class="form-header">
            <h1 class="form-title">Registrácia</h1>
            <p class="form-subtitle">Vytvorte si účet pre prístup k systému.</p>
          </div>

          <form (ngSubmit)="onSubmit()" class="registration-form">
            <button mat-raised-button color="primary" type="submit">Registrovať</button>
          </form>

          <div class="divider">
            <span>Alebo</span>
          </div>

          <div class="auth-prompt">
            <p>
              Už máte účet?
              <a class="auth-link" href="javascript:void(0)" (click)="redirectToLogin()">
                Prihláste sa
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
